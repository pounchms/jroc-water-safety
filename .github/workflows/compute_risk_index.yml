name: Compute Full Risk Index

on:
  schedule:
    - cron: '45 11 * * *'  # Runs daily at 7:45am ET (11:45 UTC) -- after river (7:00), upstream (7:15), weather (7:30)
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  compute:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas gspread google-auth

      - name: Run risk index combiner
        run: python pipeline/compute_daily_risk_index.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Export static site data
        # Reads the same local CSVs the three fetch scripts already committed
        # this morning -- no Sheets credentials needed for this step, so the
        # public GitHub Pages site has no runtime dependency on Google at all.
        run: python pipeline/export_site_data.py

      - name: Commit and push site data
        run: |
          git config user.email "pounchms@vcu.edu"
          git config user.name "Matt"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "Auto-refresh site data $(date -u '+%Y-%m-%d')"
          git push
