name: Refresh NWS Weather Data

on:
  schedule:
    - cron: '30 11 * * *'  # Runs daily at 7:30am ET, just after the other two
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas gspread google-auth

      - name: Run NWS weather fetch script
        run: python pipeline/nws_weather.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Commit and push updated CSV
        run: |
          git config user.email "pounchms@vcu.edu"
          git config user.name "Matt"
          git add nws_weather_conditions.csv
          git diff --staged --quiet || git commit -m "Auto-refresh weather data $(date -u '+%Y-%m-%d')"
          # another workflow may push in the same window -- rebase and retry once before giving up
          git pull --rebase origin master
          git push || (git pull --rebase origin master && git push)
