name: Refresh Upstream Gauge Data

on:
  schedule:
    - cron: '15 11 * * *'  # Runs daily at 7:15am ET, just after the river script
  workflow_dispatch:       # Also allows manual trigger from GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas gspread google-auth

      - name: Run upstream gauge fetch script
        run: python pipeline/usgs_upstream.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

      - name: Commit and push updated CSV
        run: |
          git config user.email "pounchms@vcu.edu"
          git config user.name "Matt"
          git add usgs_bentcreek_conditions.csv
          git diff --staged --quiet || git commit -m "Auto-refresh upstream gauge data $(date -u '+%Y-%m-%d')"
          git push
